version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: exported
        disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
